<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    :root { color-scheme: light dark; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        font-size: 13px;
        line-height: 1.6;
        padding: 20px;
        max-width: 900px;
        margin: 0 auto;
        background: transparent;
    }
    @media (prefers-color-scheme: dark) {
        :root { --text: #e0e0e0; --border: #333; --code-bg: #2d2d2d; }
        body { color: var(--text); }
    }
    @media (prefers-color-scheme: light) {
        :root { --text: #1d1d1f; --border: #d2d2d7; --code-bg: #f5f5f7; }
        body { color: var(--text); }
    }
    h1 { font-size: 1.8em; font-weight: 700; }
    h2 { font-size: 1.4em; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    h3 { font-size: 1.1em; font-weight: 600; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    th { background: var(--code-bg); font-weight: 600; }
    code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    pre { background: var(--code-bg); padding: 12px; border-radius: 6px; overflow-x: auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div id="content"></div>
<script>
    const markdown = document.getElementById('markdown-source')?.textContent || '';
    document.getElementById('content').innerHTML = marked.parse(markdown);
</script>
</body>
</html>
